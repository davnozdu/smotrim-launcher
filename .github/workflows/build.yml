name: Build APK

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Decode keystore (release signing)
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/keystore.jks"
            {
              echo "storeFile=$RUNNER_TEMP/keystore.jks"
              echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}"
              echo "keyAlias=${{ secrets.KEY_ALIAS }}"
              echo "keyPassword=${{ secrets.KEY_PASSWORD }}"
            } >> android/local.properties
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release APK (signed)
        if: steps.keystore.outputs.signed == 'true'
        run: flutter build apk --release

      - name: Build debug APK (unsigned fallback)
        if: steps.keystore.outputs.signed == 'false'
        run: flutter build apk --debug

      - name: Collect APKs
        run: |
          mkdir -p dist
          find build/app/outputs/flutter-apk -name "*.apk" -exec cp {} dist/ \;
          ls -la dist

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ltvlauncher-apk
          path: dist/*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
